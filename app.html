<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FormIQ — Form Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #FAFAF8; font-family: 'Inter', sans-serif; color: #334155; }

    /* ── Animations ─────────────────────────────────────────────── */
    @keyframes spin         { to { transform: rotate(360deg); } }
    @keyframes fadeInUp     { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseOpacity { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
    .spinner    { animation: spin 0.75s linear infinite; display: inline-block; width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #F59E0B; border-radius: 50%; }
    .fade-in    { animation: fadeInUp 0.35s ease-out forwards; }
    .pulse-anim { animation: pulseOpacity 1.6s ease-in-out infinite; }

    /* ── Header ─────────────────────────────────────────────────── */
    header { background: #0F1E3C; border-bottom: 1px solid #1e3560; }
    .header-inner { max-width: 720px; margin: 0 auto; padding: 0.875rem 1.25rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-text { font-family: 'DM Serif Display', serif; font-size: 1.35rem; color: #FAFAF8; }
    .user-info { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .user-email { font-size: 0.72rem; color: #64748b; }
    .user-meta  { display: flex; gap: 0.5rem; align-items: center; font-size: 0.72rem; color: #94a3b8; }
    .btn-signout { background: none; border: 1px solid #2e4470; border-radius: 6px; padding: 0.3rem 0.75rem; font-family: inherit; font-size: 0.72rem; color: #94a3b8; cursor: pointer; }

    /* ── Main ───────────────────────────────────────────────────── */
    main { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 1rem; }

    /* ── Search ─────────────────────────────────────────────────── */
    .search-label { display: block; font-family: 'DM Serif Display', serif; font-size: 1.75rem; color: #0F1E3C; margin-bottom: 0.85rem; line-height: 1.25; }
    .search-row   { display: flex; gap: 0.625rem; flex-wrap: wrap; }
    .search-input { flex: 1 1 200px; padding: 0.825rem 1rem; font-size: 1rem; font-family: inherit; border: 1.5px solid #d1d5db; border-radius: 8px; outline: none; color: #0F1E3C; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .search-input:focus { border-color: #F59E0B; }
    .btn-lookup { padding: 0.825rem 1.5rem; font-size: 0.95rem; font-weight: 600; font-family: inherit; background: #0F1E3C; color: #FAFAF8; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; }
    .btn-lookup:disabled { background: #94a3b8; cursor: not-allowed; }

    /* ── History chips ──────────────────────────────────────────── */
    .history { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; margin-bottom: 1.5rem; margin-top: 0.75rem; }
    .history-label { font-size: 0.72rem; color: #94a3b8; margin-right: 2px; }
    .chip { padding: 0.2rem 0.7rem; font-size: 0.78rem; font-family: 'IBM Plex Mono', monospace; background: #fff; border: 1.5px solid #0F1E3C; border-radius: 999px; color: #0F1E3C; cursor: pointer; }
    .chip:hover { background: #0F1E3C; color: #FAFAF8; }

    /* ── Loading / error ────────────────────────────────────────── */
    .loading-state { text-align: center; padding: 3rem 1rem; }
    .loading-text  { margin-top: 1rem; font-size: 0.95rem; color: #64748b; }
    .error-box { display: flex; gap: 0.75rem; align-items: flex-start; padding: 1rem 1.25rem; background: #fff8f0; border: 1.5px solid #fcd9a0; border-radius: 10px; }
    .error-box p { margin: 0; font-size: 0.9rem; color: #7c2d12; line-height: 1.55; }

    /* ── Card ───────────────────────────────────────────────────── */
    .card { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); padding: 1.5rem; }

    /* ── Tabs ───────────────────────────────────────────────────── */
    .tab-bar { display: flex; align-items: center; border-bottom: 2px solid #e2e8f0; margin-bottom: 1.5rem; }
    .tab-btn { padding: 0.7rem 1.1rem; font-family: inherit; font-size: 0.875rem; font-weight: 400; color: #6b7280; background: none; border: none; border-bottom: 2.5px solid transparent; margin-bottom: -2px; cursor: pointer; }
    .tab-btn.active { border-bottom-color: #F59E0B; color: #0F1E3C; font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Info boxes ─────────────────────────────────────────────── */
    .info-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.875rem 1rem; margin-bottom: 0.75rem; }
    .info-label { font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; margin: 0 0 0.4rem; }
    .info-body  { font-size: 0.9rem; color: #334155; line-height: 1.65; margin: 0; }

    /* ── Overview ───────────────────────────────────────────────── */
    .form-title { font-family: 'DM Serif Display', serif; font-size: 1.45rem; color: #0F1E3C; margin: 0 0 0.2rem; }
    .form-alias { margin: 0 0 1.25rem; font-size: 0.82rem; color: #64748b; }

    /* ── Instructions ───────────────────────────────────────────── */
    .instr-list { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
    .instr-item { display: flex; gap: 0.875rem; align-items: flex-start; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.875rem 1rem; }
    .instr-num  { flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; background: #0F1E3C; color: #FAFAF8; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; margin-top: 1px; }
    .instr-field { font-family: 'IBM Plex Mono', monospace; font-size: 0.83rem; font-weight: 500; color: #0F1E3C; margin: 0 0 0.3rem; }
    .instr-text  { font-size: 0.875rem; color: #334155; line-height: 1.65; margin: 0; }
    .instr-warn  { margin: 0.5rem 0 0; font-size: 0.8rem; color: #92400e; line-height: 1.5; background: #fffbeb; border: 1px solid #fde68a; border-radius: 5px; padding: 0.35rem 0.6rem; }
    .tips-box { margin-top: 1.25rem; padding: 1rem 1.125rem; background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 10px; }
    .tips-label { font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: #15803d; margin: 0 0 0.6rem; }
    .tips-list  { margin: 0; padding-left: 1.2rem; display: flex; flex-direction: column; gap: 0.35rem; }
    .tips-list li { font-size: 0.875rem; color: #166534; line-height: 1.55; }

    /* ── Sample ─────────────────────────────────────────────────── */
    .sample-wrapper { position: relative; }
    .sample-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-18deg); font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: rgba(15,30,60,0.07); letter-spacing: 0.12em; pointer-events: none; white-space: nowrap; z-index: 0; user-select: none; }
    .sample-table { position: relative; z-index: 1; background: #fff; border: 2px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
    .sample-header { padding: 0.875rem 1.125rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; background: #f8fafc; }
    .sample-title { margin: 0; font-family: 'DM Serif Display', serif; font-size: 0.95rem; color: #0F1E3C; }
    .sample-subtitle { margin: 2px 0 0; font-size: 0.72rem; color: #64748b; }
    .sample-badge { padding: 0.2rem 0.65rem; background: #fef3c7; border: 1px solid #fde68a; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: #92400e; font-weight: 500; }
    .sample-row { display: flex; gap: 0.75rem; align-items: flex-start; padding: 0.55rem 1.125rem; flex-wrap: wrap; }
    .sample-row:nth-child(odd) { background: #fff; }
    .sample-row:nth-child(even) { background: #f8fafc; }
    .sample-field { font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; color: #64748b; min-width: 170px; flex-shrink: 0; }
    .sample-arrow { font-size: 0.78rem; color: #94a3b8; flex-shrink: 0; }
    .sample-value { font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; color: #0F1E3C; font-weight: 500; flex: 1; }
    .sample-note { margin-top: 0.6rem; text-align: center; font-size: 0.72rem; color: #94a3b8; }

    /* ── Download / preview bar ─────────────────────────────────── */
    .dl-bar { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; padding: 0.875rem 1rem; background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 10px; }
    .dl-bar-text { font-size: 0.82rem; color: #166534; flex: 1; line-height: 1.45; }
    .btn-fill    { padding: 0.6rem 1.1rem; font-family: inherit; font-size: 0.85rem; font-weight: 600; background: #0F1E3C; color: #FAFAF8; border: none; border-radius: 7px; cursor: pointer; white-space: nowrap; }
    .btn-fill:disabled { background: #94a3b8; cursor: not-allowed; }
    .btn-preview { padding: 0.6rem 1.1rem; font-family: inherit; font-size: 0.85rem; font-weight: 600; background: #F59E0B; color: #0F1E3C; border: none; border-radius: 7px; cursor: pointer; white-space: nowrap; }
    .btn-preview:disabled { background: #94a3b8; color: #fff; cursor: not-allowed; }
    .btn-blank   { padding: 0.6rem 1.1rem; font-family: inherit; font-size: 0.85rem; font-weight: 500; background: #fff; color: #0F1E3C; border: 1.5px solid #0F1E3C; border-radius: 7px; cursor: pointer; white-space: nowrap; text-decoration: none; display: inline-block; }
    .no-pdf-note { font-size: 0.82rem; color: #94a3b8; margin: 0 0 1.25rem; font-style: italic; }

    /* ── Inline PDF viewer ──────────────────────────────────────── */
    .pdf-viewer-wrap { margin-bottom: 1.25rem; border: 2px solid #0F1E3C; border-radius: 10px; overflow: hidden; }
    .pdf-viewer-bar  { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1rem; background: #0F1E3C; flex-wrap: wrap; gap: 0.5rem; }
    .pdf-viewer-label { font-size: 0.78rem; color: #94a3b8; font-family: 'IBM Plex Mono', monospace; }
    .pdf-viewer-actions { display: flex; gap: 0.5rem; }
    .pdf-viewer-btn { padding: 0.3rem 0.75rem; font-family: inherit; font-size: 0.75rem; font-weight: 600; border: none; border-radius: 5px; cursor: pointer; }
    .pdf-viewer-close { background: #374151; color: #e2e8f0; }
    .pdf-viewer-dl    { background: #F59E0B; color: #0F1E3C; text-decoration: none; display: inline-block; }
    .pdf-frame { display: block; width: 100%; height: 780px; border: none; }

    /* ── Footer ─────────────────────────────────────────────────── */
    footer { max-width: 720px; margin: 2rem auto 0; padding: 1.25rem 1.25rem 2rem; border-top: 1px solid #e2e8f0; text-align: center; }
    footer p { margin: 0; font-size: 0.73rem; color: #9ca3af; line-height: 1.65; }

    /* ── Upgrade Modal ──────────────────────────────────────────── */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(15,30,60,0.6); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .modal-backdrop.open { display: flex; }
    .modal-box { background: #fff; border-radius: 14px; padding: 2rem; max-width: 460px; width: 100%; box-shadow: 0 24px 64px rgba(0,0,0,0.22); position: relative; text-align: center; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.4rem; color: #9ca3af; cursor: pointer; line-height: 1; }
    .modal-icon  { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.45rem; color: #0F1E3C; margin: 0 0 0.6rem; }
    .modal-desc  { font-size: 0.9rem; color: #64748b; line-height: 1.6; margin: 0 0 1.25rem; }
    .modal-price { background: #f8fafc; border-radius: 10px; padding: 1rem; margin-bottom: 1.25rem; border: 1px solid #e2e8f0; }
    .modal-price-amt { font-family: 'DM Serif Display', serif; font-size: 1.85rem; color: #0F1E3C; margin: 0 0 0.15rem; }
    .modal-price-note { margin: 0; font-size: 0.78rem; color: #94a3b8; }
    .btn-upgrade { display: block; padding: 0.85rem; background: #F59E0B; color: #0F1E3C; border-radius: 8px; font-family: inherit; font-weight: 700; font-size: 0.95rem; text-decoration: none; margin-bottom: 0.65rem; border: none; cursor: pointer; width: 100%; }
    .btn-later { background: none; border: none; font-family: inherit; font-size: 0.8rem; color: #94a3b8; cursor: pointer; }

    /* ── Full-screen spinner ────────────────────────────────────── */
    #auth-loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    #app { display: none; }
  </style>
</head>
<body>

  <!-- Auth loading spinner shown while checking session -->
  <div id="auth-loading">
    <div class="spinner"></div>
  </div>

  <!-- App shell (hidden until auth passes) -->
  <div id="app">
    <header>
      <div class="header-inner">
        <div class="logo">
          <span aria-hidden="true">📋</span>
          <span class="logo-text">FormIQ</span>
        </div>
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
          <div class="user-info" id="user-info"></div>
          <button class="btn-signout" id="btn-signout">Sign out</button>
        </div>
      </div>
    </header>

    <main>
      <form id="search-form">
        <label class="search-label" for="search-input">What form do you need help with?</label>
        <div class="search-row">
          <input class="search-input" id="search-input" type="text" placeholder="Enter a form name, e.g. W-2, I-9, DS-160…" autocomplete="off" />
          <button class="btn-lookup" id="btn-lookup" type="submit">Look Up Form</button>
        </div>
      </form>

      <div class="history" id="history" style="display:none;"></div>

      <div id="status-area" aria-live="polite" aria-atomic="false"></div>
    </main>

    <footer>
      <p>FormIQ provides AI-generated guidance for informational purposes only. Always verify form instructions with the issuing agency. Not legal or tax advice.</p>
    </footer>
  </div>

  <!-- Upgrade Modal -->
  <div class="modal-backdrop" id="upgrade-modal" role="dialog" aria-modal="true">
    <div class="modal-box">
      <button class="modal-close" id="upgrade-close" aria-label="Close">&times;</button>
      <div class="modal-icon" id="upgrade-icon"></div>
      <h2 class="modal-title" id="upgrade-title"></h2>
      <p class="modal-desc" id="upgrade-desc"></p>
      <div class="modal-price">
        <p class="modal-price-amt">$29/month</p>
        <p class="modal-price-note">Cancel anytime · No commitment</p>
      </div>
      <a href="/" class="btn-upgrade">Upgrade to Pro →</a>
      <div id="upgrade-later-wrap">
        <button class="btn-later" id="upgrade-later">I'll come back tomorrow</button>
      </div>
    </div>
  </div>

<script>
  /* ── State ───────────────────────────────────────────────────── */
  var currentUser = null;
  var currentResult = null;
  var searchHistory = [];

  /* ── DOM refs ────────────────────────────────────────────────── */
  var authLoading  = document.getElementById('auth-loading');
  var appShell     = document.getElementById('app');
  var userInfoEl   = document.getElementById('user-info');
  var btnSignout   = document.getElementById('btn-signout');
  var searchForm   = document.getElementById('search-form');
  var searchInput  = document.getElementById('search-input');
  var btnLookup    = document.getElementById('btn-lookup');
  var historyEl    = document.getElementById('history');
  var statusArea   = document.getElementById('status-area');
  var upgradeModal = document.getElementById('upgrade-modal');
  var upgradeClose = document.getElementById('upgrade-close');
  var upgradeLater = document.getElementById('upgrade-later');

  /* ── Auth ────────────────────────────────────────────────────── */
  fetch('/api/me')
    .then(function(r) {
      if (!r.ok) { window.location.href = '/'; return null; }
      return r.json();
    })
    .then(function(data) {
      if (!data || data.error) { window.location.href = '/'; return; }
      currentUser = data;
      renderUserInfo();
      authLoading.style.display = 'none';
      appShell.style.display = 'block';
      if (data.trialExpired) showUpgradeModal('trial_expired');
    })
    .catch(function() { window.location.href = '/'; });

  function refreshUser() {
    fetch('/api/me').then(function(r) { return r.json(); }).then(function(d) {
      currentUser = d;
      renderUserInfo();
    }).catch(function() {});
  }

  /* ── Render user info in header ─────────────────────────────── */
  function renderUserInfo() {
    if (!currentUser) { userInfoEl.innerHTML = ''; return; }
    var plan   = currentUser.plan;
    var exp    = currentUser.trialExpired;
    var days   = currentUser.daysLeft;
    var count  = currentUser.dailyCount || 0;
    var limit  = currentUser.dailyLimit;

    if (plan === 'admin') {
      var adminLink = document.getElementById('admin-nav-link');
      if (!adminLink) {
        var a = document.createElement('a');
        a.id = 'admin-nav-link';
        a.href = '/admin';
        a.textContent = 'Admin ↗';
        a.style.cssText = 'font-size:0.72rem;color:#F59E0B;font-weight:600;text-decoration:none;margin-right:0.5rem;';
        btnSignout.parentNode.insertBefore(a, btnSignout);
      }
    }

    var metaHtml = '';
    if (plan === 'free' && !exp) {
      var dayColor = (days <= 1) ? '#f87171' : '#94a3b8';
      var dayLabel = (days === 0) ? 'Trial ends today' : days + 'd trial left';
      metaHtml = '<span style="color:#F59E0B;font-weight:600;">' + count + '</span>/' + limit + ' today'
               + '<span style="color:#2e4470;margin:0 2px;">·</span>'
               + '<span style="color:' + dayColor + ';">' + dayLabel + '</span>';
    } else if (plan === 'pro') {
      metaHtml = '<span style="color:#F59E0B;font-weight:600;">Pro</span>';
    } else if (exp) {
      metaHtml = '<span style="color:#f87171;">Trial ended</span>';
    }

    userInfoEl.innerHTML =
      '<span class="user-email">' + escHtml(currentUser.email) + '</span>' +
      (metaHtml ? '<div class="user-meta">' + metaHtml + '</div>' : '');
  }

  /* ── Sign out ────────────────────────────────────────────────── */
  btnSignout.addEventListener('click', function() {
    fetch('/api/logout', { method: 'POST' }).finally(function() {
      window.location.href = '/';
    });
  });

  /* ── Search ──────────────────────────────────────────────────── */
  searchForm.addEventListener('submit', function(e) {
    e.preventDefault();
    var q = searchInput.value.trim();
    if (q) doLookup(q);
  });

  function doLookup(formName) {
    setLoading(true, formName);

    fetch('/api/lookup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ formName: formName }),
    })
    .then(function(res) {
      if (res.status === 401) { window.location.href = '/'; return null; }
      if (res.status === 403 || res.status === 429) {
        return res.json().then(function(body) {
          showUpgradeModal(body.error);
          setLoading(false);
          return null;
        });
      }
      if (!res.ok) {
        return res.json().catch(function() { return {}; }).then(function(body) {
          throw new Error(body.error || ('Server error ' + res.status));
        });
      }
      return res.json();
    })
    .then(function(data) {
      if (!data) return;
      setLoading(false);
      refreshUser();

      // Claude API wraps the response in content blocks
      var text = '';
      if (data.content) {
        data.content.forEach(function(b) { if (b.type === 'text') text += b.text; });
      } else if (typeof data === 'string') {
        text = data;
      }

      var parsed;
      try { parsed = JSON.parse(text); }
      catch(e) { showError('Something went wrong parsing the response. Please try again.'); return; }

      if (!parsed.found) {
        showError(parsed.message || "We couldn't find that form. Try a more specific name (e.g. 'IRS Form 1040').");
      } else {
        addHistory(formName);
        showResult(parsed);
      }
    })
    .catch(function(err) {
      setLoading(false);
      showError('Something went wrong: ' + err.message + '. Please try again.');
    });
  }

  /* ── Loading state ───────────────────────────────────────────── */
  function setLoading(on, formName) {
    btnLookup.disabled = on;
    searchInput.disabled = on;
    btnLookup.textContent = on ? 'Looking up…' : 'Look Up Form';
    if (on) {
      statusArea.innerHTML =
        '<div class="loading-state fade-in">' +
          '<div class="spinner" role="status" aria-label="Loading"></div>' +
          '<p class="loading-text pulse-anim">Looking up <strong style="color:#0F1E3C;">' + escHtml(formName) + '</strong>…</p>' +
        '</div>';
    }
  }

  /* ── Error state ─────────────────────────────────────────────── */
  function showError(msg) {
    statusArea.innerHTML =
      '<div class="error-box fade-in" role="alert">' +
        '<span style="font-size:1.25rem;flex-shrink:0;">⚠️</span>' +
        '<p>' + escHtml(msg) + '</p>' +
      '</div>';
  }

  /* ── Result rendering ────────────────────────────────────────── */
  function showResult(r) {
    currentResult = r;
    var html =
      '<div class="card fade-in">' +
        renderTabBar() +
        '<div id="panel-overview"  class="tab-panel active">' + renderOverview(r)     + '</div>' +
        '<div id="panel-instructions" class="tab-panel">'     + renderInstructions(r) + '</div>' +
        '<div id="panel-sample"    class="tab-panel">'        + renderSample(r)       + '</div>' +
      '</div>';
    statusArea.innerHTML = html;

    // Wire up tab buttons
    statusArea.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var target = btn.dataset.tab;
        statusArea.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        statusArea.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
        btn.classList.add('active');
        document.getElementById('panel-' + target).classList.add('active');
      });
    });

    // Wire up fill-form buttons
    var fillBtn = document.getElementById('btn-fill-form');
    if (fillBtn) fillBtn.addEventListener('click', function() { downloadFilledForm(); });

    var previewBtn = document.getElementById('btn-preview-form');
    if (previewBtn) previewBtn.addEventListener('click', function() { previewFilledForm(); });
  }

  function renderTabBar() {
    return '<div class="tab-bar" role="tablist">' +
      '<button class="tab-btn active" data-tab="overview">Overview</button>' +
      '<button class="tab-btn" data-tab="instructions">Instructions</button>' +
      '<button class="tab-btn" data-tab="sample">Filled Sample</button>' +
    '</div>';
  }

  function renderOverview(r) {
    var alias = (r.common_name && r.common_name !== r.form_name)
      ? '<p class="form-alias">Also known as: <em>' + escHtml(r.common_name) + '</em></p>' : '';

    var bullets = (r.who_needs_it || []).map(function(x) {
      return '<li style="font-size:0.9rem;color:#334155;line-height:1.65;margin-bottom:0.2rem;">' + escHtml(x) + '</li>';
    }).join('');

    var deadline = r.deadline
      ? '<div class="info-box"><p class="info-label">Deadline / When to File</p><p class="info-body">' + escHtml(r.deadline) + '</p></div>' : '';
    var submit = r.where_to_submit
      ? '<div class="info-box"><p class="info-label">Where to Submit</p><p class="info-body">' + escHtml(r.where_to_submit) + '</p></div>' : '';

    return '<h2 class="form-title">' + escHtml(r.form_name) + '</h2>' + alias +
      '<div class="info-box"><p class="info-label">Issued By</p><p class="info-body">' + escHtml(r.issued_by) + '</p></div>' +
      '<div class="info-box"><p class="info-label">Purpose</p><p class="info-body">' + escHtml(r.purpose) + '</p></div>' +
      '<div class="info-box"><p class="info-label">Who Needs It</p><ul style="margin:0;padding-left:1.25rem;">' + bullets + '</ul></div>' +
      deadline + submit;
  }

  function renderInstructions(r) {
    var items = (r.instructions || []).map(function(item, i) {
      var warn = item.warning
        ? '<p class="instr-warn">⚠️ ' + escHtml(item.warning) + '</p>' : '';
      return '<li class="instr-item">' +
        '<div class="instr-num">' + (i + 1) + '</div>' +
        '<div style="flex:1;">' +
          '<p class="instr-field">' + escHtml(item.field) + '</p>' +
          '<p class="instr-text">' + escHtml(item.instruction) + '</p>' +
          warn +
        '</div>' +
      '</li>';
    }).join('');

    var tips = '';
    if (r.tips && r.tips.length) {
      var tipItems = r.tips.map(function(t) { return '<li>' + escHtml(t) + '</li>'; }).join('');
      tips = '<div class="tips-box"><p class="tips-label">💡 Pro Tips</p><ul class="tips-list">' + tipItems + '</ul></div>';
    }

    return '<ol class="instr-list">' + items + '</ol>' + tips;
  }

  function renderSample(r) {
    var rows = (r.sample || []).map(function(item) {
      return '<div class="sample-row">' +
        '<span class="sample-field">' + escHtml(item.field) + '</span>' +
        '<span class="sample-arrow">→</span>' +
        '<span class="sample-value">' + escHtml(item.value) + '</span>' +
      '</div>';
    }).join('');

    var dlBar = '';
    if (r.official_pdf_url) {
      dlBar =
        '<div class="dl-bar">' +
          '<span class="dl-bar-text">📄 Official PDF found — preview or download the form pre-filled with sample data.</span>' +
          '<a href="' + escAttr(r.official_pdf_url) + '" target="_blank" rel="noopener" class="btn-blank">Blank PDF</a>' +
          '<button class="btn-preview" id="btn-preview-form">👁 Preview Filled</button>' +
          '<button class="btn-fill" id="btn-fill-form">⬇ Download</button>' +
        '</div>' +
        '<div id="pdf-viewer-wrap" style="display:none;"></div>';
    } else {
      dlBar = '<p class="no-pdf-note">No official downloadable PDF for this form (submitted online or employer-generated).</p>';
    }

    return dlBar +
      '<div class="sample-wrapper">' +
        '<div class="sample-watermark" aria-hidden="true">SAMPLE — NOT FOR SUBMISSION</div>' +
        '<div class="sample-table">' +
          '<div class="sample-header">' +
            '<div><p class="sample-title">' + escHtml(r.form_name) + '</p><p class="sample-subtitle">All fields · Alex Rivera · fictional data</p></div>' +
            '<span class="sample-badge">SAMPLE</span>' +
          '</div>' +
          rows +
        '</div>' +
      '</div>' +
      '<p class="sample-note">Fictional data only. Do not use on an actual form.</p>';
  }

  /* ── Download pre-filled PDF ─────────────────────────────────── */
  function downloadFilledForm() {
    if (!currentResult) return;
    var btn = document.getElementById('btn-fill-form');
    if (!btn) return;
    btn.disabled = true;
    btn.textContent = '⏳ Preparing…';

    var fillRes;
    fetch('/api/fill-form', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        formName: currentResult.form_name,
        pdfUrl:   currentResult.official_pdf_url,
        fields:   currentResult.sample,
      }),
    })
    .then(function(res) {
      fillRes = res;
      if (!res.ok) {
        return res.json().catch(function() { return {}; }).then(function(d) {
          var err = new Error(d.error || 'Server error ' + res.status);
          err.fallbackUrl = d.fallback_url || currentResult.official_pdf_url;
          throw err;
        });
      }
      return res.blob();
    })
    .then(function(blob) {
      var filled = parseInt(fillRes.headers.get('X-Fields-Filled') || '0', 10);
      var total  = parseInt(fillRes.headers.get('X-Fields-Total')  || '0', 10);

      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = (currentResult.form_name || 'form').replace(/[^a-z0-9]/gi, '-').toLowerCase() + '-filled.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      btn.disabled = false;
      var label = filled > 0
        ? '✓ Downloaded (' + filled + '/' + total + ' fields filled)'
        : '✓ Downloaded';
      btn.textContent = label;
      setTimeout(function() { if (btn) btn.textContent = '⬇ Download Pre-filled'; }, 4000);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = '⬇ Download Pre-filled';
      var dlBar = btn.closest ? btn.closest('.dl-bar') : null;
      if (dlBar) {
        // Remove any previous error
        var prev = dlBar.querySelector('.dl-err');
        if (prev) prev.parentNode.removeChild(prev);

        var errEl = document.createElement('div');
        errEl.className = 'dl-err';
        errEl.style.cssText = 'margin-top:0.6rem;font-size:0.8rem;color:#b91c1c;width:100%;line-height:1.5;';
        var msg = '⚠️ ' + err.message;
        if (err.fallbackUrl) {
          msg += ' — <a href="' + escAttr(err.fallbackUrl) + '" target="_blank" rel="noopener" style="color:#1d4ed8;">Download blank form instead</a>';
          errEl.innerHTML = msg;
        } else {
          errEl.textContent = msg;
        }
        dlBar.appendChild(errEl);
      }
    });
  }

  /* ── Preview filled PDF inline ───────────────────────────────── */
  var previewBlobUrl = null;

  function previewFilledForm() {
    if (!currentResult) return;
    var btn = document.getElementById('btn-preview-form');
    var wrap = document.getElementById('pdf-viewer-wrap');
    if (!btn || !wrap) return;

    // If already showing, toggle off
    if (wrap.style.display !== 'none') {
      wrap.style.display = 'none';
      btn.textContent = '👁 Preview Filled';
      return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Loading…';

    fetch('/api/fill-form', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        formName: currentResult.form_name,
        pdfUrl:   currentResult.official_pdf_url,
        fields:   currentResult.sample,
      }),
    })
    .then(function(res) {
      if (!res.ok) {
        return res.json().catch(function() { return {}; }).then(function(d) {
          throw new Error(d.error || 'Server error ' + res.status);
        });
      }
      return res.blob();
    })
    .then(function(blob) {
      if (previewBlobUrl) URL.revokeObjectURL(previewBlobUrl);
      previewBlobUrl = URL.createObjectURL(blob);

      var safeName = (currentResult.form_name || 'form').replace(/[^a-z0-9]/gi, '-').toLowerCase() + '-filled.pdf';
      wrap.innerHTML =
        '<div class="pdf-viewer-wrap">' +
          '<div class="pdf-viewer-bar">' +
            '<span class="pdf-viewer-label">📋 ' + escHtml(currentResult.form_name) + ' — filled with sample data (Alex Rivera)</span>' +
            '<div class="pdf-viewer-actions">' +
              '<a href="' + previewBlobUrl + '" download="' + escAttr(safeName) + '" class="pdf-viewer-btn pdf-viewer-dl">⬇ Download</a>' +
              '<button class="pdf-viewer-btn pdf-viewer-close" id="btn-close-preview">✕ Close</button>' +
            '</div>' +
          '</div>' +
          '<iframe class="pdf-frame" src="' + previewBlobUrl + '" title="Filled form preview"></iframe>' +
        '</div>';
      wrap.style.display = 'block';
      wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });

      document.getElementById('btn-close-preview').addEventListener('click', function() {
        wrap.style.display = 'none';
        btn.textContent = '👁 Preview Filled';
      });

      btn.disabled = false;
      btn.textContent = '👁 Hide Preview';
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = '👁 Preview Filled';
      var dlBar = btn.closest ? btn.closest('.dl-bar') : null;
      if (dlBar) {
        var prev = dlBar.querySelector('.dl-err');
        if (prev) prev.parentNode.removeChild(prev);
        var errEl = document.createElement('div');
        errEl.className = 'dl-err';
        errEl.style.cssText = 'margin-top:0.5rem;font-size:0.8rem;color:#b91c1c;width:100%;';
        errEl.textContent = '⚠️ ' + err.message;
        dlBar.appendChild(errEl);
      }
    });
  }

  /* ── History ─────────────────────────────────────────────────── */
  function addHistory(name) {
    searchHistory = searchHistory.filter(function(h) { return h.toLowerCase() !== name.toLowerCase(); });
    searchHistory.unshift(name);
    if (searchHistory.length > 5) searchHistory = searchHistory.slice(0, 5);
    renderHistory();
  }

  function renderHistory() {
    if (!searchHistory.length) { historyEl.style.display = 'none'; return; }
    var chips = searchHistory.map(function(name) {
      return '<button class="chip" data-name="' + escAttr(name) + '">' + escHtml(name) + '</button>';
    }).join('');
    historyEl.innerHTML = '<span class="history-label">Recent:</span>' + chips;
    historyEl.style.display = 'flex';

    historyEl.querySelectorAll('.chip').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var n = btn.dataset.name;
        searchInput.value = n;
        doLookup(n);
      });
    });
  }

  /* ── Upgrade modal ───────────────────────────────────────────── */
  function showUpgradeModal(reason) {
    var isExpired = reason === 'trial_expired';
    document.getElementById('upgrade-icon').textContent  = isExpired ? '⏱️' : '🔒';
    document.getElementById('upgrade-title').textContent = isExpired ? 'Your free trial has ended' : "You've hit today's limit";
    document.getElementById('upgrade-desc').textContent  = isExpired
      ? 'Your 7-day free trial is over. Upgrade to Pro for unlimited lookups, PDF export, and more.'
      : "You've used all 10 free lookups for today. Come back tomorrow, or upgrade to Pro for unlimited access.";
    document.getElementById('upgrade-later-wrap').style.display = isExpired ? 'none' : 'block';
    upgradeModal.classList.add('open');
  }

  upgradeClose.addEventListener('click', function() { upgradeModal.classList.remove('open'); });
  upgradeLater.addEventListener('click', function() { upgradeModal.classList.remove('open'); });
  upgradeModal.addEventListener('click', function(e) { if (e.target === upgradeModal) upgradeModal.classList.remove('open'); });

  /* ── Utility ─────────────────────────────────────────────────── */
  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
  function escAttr(s) { return escHtml(s); }
</script>
</body>
</html>
