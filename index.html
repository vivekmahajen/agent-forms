<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FormIQ — Instant Form Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #FAFAF8; font-family: 'Inter', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState } = React;

  /* ── helpers ────────────────────────────────────────────────── */
  async function apiFetch(path, body) {
    const res = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Something went wrong');
    return data;
  }

  /* ── Modal shell ────────────────────────────────────────────── */
  function Modal({ onClose, children }) {
    return (
      <div
        onClick={e => { if (e.target === e.currentTarget) onClose(); }}
        style={{
          position: 'fixed', inset: 0, zIndex: 300,
          background: 'rgba(15,30,60,0.6)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: '1rem',
        }}
        role="dialog" aria-modal="true"
      >
        <div style={{
          background: '#fff', borderRadius: '14px', padding: '2rem',
          maxWidth: '440px', width: '100%',
          boxShadow: '0 24px 64px rgba(0,0,0,0.2)',
          position: 'relative',
        }}>
          <button onClick={onClose} aria-label="Close" style={{
            position: 'absolute', top: '1rem', right: '1rem',
            background: 'none', border: 'none', fontSize: '1.5rem',
            color: '#9ca3af', cursor: 'pointer', lineHeight: 1,
          }}>×</button>
          {children}
        </div>
      </div>
    );
  }

  /* ── Input ──────────────────────────────────────────────────── */
  function Field({ label, id, type = 'text', value, onChange, placeholder }) {
    return (
      <div style={{ marginBottom: '1rem' }}>
        <label htmlFor={id} style={{
          display: 'block', fontFamily: 'Inter', fontWeight: 600,
          fontSize: '0.78rem', color: '#374151', marginBottom: '0.35rem',
        }}>{label}</label>
        <input
          id={id} type={type} value={value} onChange={onChange}
          placeholder={placeholder}
          style={{
            display: 'block', width: '100%', padding: '0.7rem 0.875rem',
            fontFamily: 'Inter', fontSize: '0.9rem',
            border: '1.5px solid #d1d5db', borderRadius: '8px',
            outline: 'none', color: '#0F1E3C', background: '#fff',
          }}
          onFocus={e => (e.target.style.borderColor = '#F59E0B')}
          onBlur={e  => (e.target.style.borderColor = '#d1d5db')}
        />
      </div>
    );
  }

  /* ── RegisterModal ──────────────────────────────────────────── */
  function RegisterModal({ onClose, onSwitch }) {
    const [email,    setEmail]    = useState('');
    const [password, setPassword] = useState('');
    const [confirm,  setConfirm]  = useState('');
    const [loading,  setLoading]  = useState(false);
    const [error,    setError]    = useState('');

    const submit = async e => {
      e.preventDefault();
      setError('');
      if (password !== confirm) { setError('Passwords do not match'); return; }
      if (password.length < 8)  { setError('Password must be at least 8 characters'); return; }
      setLoading(true);
      try {
        await apiFetch('/api/register', { email, password });
        window.location.href = '/app';
      } catch (err) {
        setError(err.message);
        setLoading(false);
      }
    };

    return (
      <Modal onClose={onClose}>
        <h2 style={{ fontFamily: '"DM Serif Display", serif', fontSize: '1.35rem', color: '#0F1E3C', margin: '0 0 0.25rem' }}>
          Create your account
        </h2>
        <p style={{ fontFamily: 'Inter', fontSize: '0.82rem', color: '#64748b', margin: '0 0 1.5rem' }}>
          Free trial · 10 lookups/day · 7 days · No credit card required
        </p>

        {error && (
          <div style={{
            background: '#fff8f0', border: '1px solid #fcd9a0', borderRadius: '8px',
            padding: '0.6rem 0.875rem', marginBottom: '1rem',
            fontFamily: 'Inter', fontSize: '0.82rem', color: '#7c2d12',
          }} role="alert">{error}</div>
        )}

        <form onSubmit={submit}>
          <Field label="Email address" id="reg-email" type="email"
            value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" />
          <Field label="Password" id="reg-password" type="password"
            value={password} onChange={e => setPassword(e.target.value)} placeholder="Min. 8 characters" />
          <Field label="Confirm password" id="reg-confirm" type="password"
            value={confirm} onChange={e => setConfirm(e.target.value)} placeholder="Repeat password" />

          <button type="submit" disabled={loading || !email || !password || !confirm}
            style={{
              display: 'block', width: '100%', padding: '0.8rem',
              background: loading || !email || !password || !confirm ? '#94a3b8' : '#0F1E3C',
              color: '#FAFAF8', border: 'none', borderRadius: '8px',
              fontFamily: 'Inter', fontWeight: 600, fontSize: '0.95rem',
              cursor: loading || !email || !password || !confirm ? 'not-allowed' : 'pointer',
              marginBottom: '1rem',
            }}>
            {loading ? 'Creating account…' : 'Start Free Trial'}
          </button>
        </form>

        <p style={{ fontFamily: 'Inter', fontSize: '0.8rem', color: '#64748b', textAlign: 'center', margin: 0 }}>
          Already have an account?{' '}
          <button onClick={onSwitch} style={{
            background: 'none', border: 'none', color: '#0F1E3C',
            fontWeight: 600, cursor: 'pointer', fontSize: '0.8rem', padding: 0,
          }}>Sign in</button>
        </p>
      </Modal>
    );
  }

  /* ── LoginModal ─────────────────────────────────────────────── */
  function LoginModal({ onClose, onSwitch }) {
    const [email,    setEmail]    = useState('');
    const [password, setPassword] = useState('');
    const [loading,  setLoading]  = useState(false);
    const [error,    setError]    = useState('');

    const submit = async e => {
      e.preventDefault();
      setError('');
      setLoading(true);
      try {
        await apiFetch('/api/login', { email, password });
        window.location.href = '/app';
      } catch (err) {
        setError(err.message);
        setLoading(false);
      }
    };

    return (
      <Modal onClose={onClose}>
        <h2 style={{ fontFamily: '"DM Serif Display", serif', fontSize: '1.35rem', color: '#0F1E3C', margin: '0 0 0.25rem' }}>
          Welcome back
        </h2>
        <p style={{ fontFamily: 'Inter', fontSize: '0.82rem', color: '#64748b', margin: '0 0 1.5rem' }}>
          Sign in to your FormIQ account
        </p>

        {error && (
          <div style={{
            background: '#fff8f0', border: '1px solid #fcd9a0', borderRadius: '8px',
            padding: '0.6rem 0.875rem', marginBottom: '1rem',
            fontFamily: 'Inter', fontSize: '0.82rem', color: '#7c2d12',
          }} role="alert">{error}</div>
        )}

        <form onSubmit={submit}>
          <Field label="Email address" id="login-email" type="email"
            value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" />
          <Field label="Password" id="login-password" type="password"
            value={password} onChange={e => setPassword(e.target.value)} placeholder="Your password" />

          <button type="submit" disabled={loading || !email || !password}
            style={{
              display: 'block', width: '100%', padding: '0.8rem',
              background: loading || !email || !password ? '#94a3b8' : '#0F1E3C',
              color: '#FAFAF8', border: 'none', borderRadius: '8px',
              fontFamily: 'Inter', fontWeight: 600, fontSize: '0.95rem',
              cursor: loading || !email || !password ? 'not-allowed' : 'pointer',
              marginBottom: '1rem',
            }}>
            {loading ? 'Signing in…' : 'Sign In'}
          </button>
        </form>

        <p style={{ fontFamily: 'Inter', fontSize: '0.8rem', color: '#64748b', textAlign: 'center', margin: 0 }}>
          Don't have an account?{' '}
          <button onClick={onSwitch} style={{
            background: 'none', border: 'none', color: '#0F1E3C',
            fontWeight: 600, cursor: 'pointer', fontSize: '0.8rem', padding: 0,
          }}>Start free trial</button>
        </p>
      </Modal>
    );
  }

  /* ── PricingCard ────────────────────────────────────────────── */
  function PricingCard({ badge, badgeColor, title, price, period, description, features, cta, ctaStyle, onCta, highlight }) {
    return (
      <div style={{
        background: highlight ? '#0F1E3C' : '#fff',
        border: highlight ? '2px solid #F59E0B' : '1.5px solid #e2e8f0',
        borderRadius: '14px',
        padding: '1.75rem',
        display: 'flex', flexDirection: 'column',
        boxShadow: highlight ? '0 8px 32px rgba(15,30,60,0.18)' : '0 2px 8px rgba(0,0,0,0.05)',
        position: 'relative',
      }}>
        {badge && (
          <span style={{
            position: 'absolute', top: '-12px', left: '50%', transform: 'translateX(-50%)',
            background: badgeColor || '#F59E0B', color: '#0F1E3C',
            fontFamily: 'Inter', fontWeight: 700, fontSize: '0.7rem',
            padding: '3px 12px', borderRadius: '999px', whiteSpace: 'nowrap',
            letterSpacing: '0.05em',
          }}>{badge}</span>
        )}

        <div style={{ marginBottom: '1.25rem' }}>
          <p style={{
            fontFamily: 'Inter', fontWeight: 600, fontSize: '0.75rem',
            textTransform: 'uppercase', letterSpacing: '0.06em',
            color: highlight ? '#94a3b8' : '#64748b', margin: '0 0 0.5rem',
          }}>{title}</p>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: '4px' }}>
            <span style={{
              fontFamily: '"DM Serif Display", serif', fontSize: '2.25rem',
              color: highlight ? '#FAFAF8' : '#0F1E3C', lineHeight: 1,
            }}>{price}</span>
            {period && <span style={{ fontFamily: 'Inter', fontSize: '0.82rem', color: highlight ? '#94a3b8' : '#64748b' }}>{period}</span>}
          </div>
          <p style={{ fontFamily: 'Inter', fontSize: '0.82rem', color: highlight ? '#94a3b8' : '#64748b', margin: '0.5rem 0 0' }}>
            {description}
          </p>
        </div>

        <ul style={{ margin: '0 0 1.5rem', padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: '0.55rem', flex: 1 }}>
          {features.map((f, i) => (
            <li key={i} style={{ display: 'flex', gap: '0.5rem', alignItems: 'flex-start' }}>
              <span style={{ color: '#F59E0B', fontWeight: 700, fontSize: '0.9rem', flexShrink: 0, marginTop: '1px' }}>✓</span>
              <span style={{ fontFamily: 'Inter', fontSize: '0.875rem', color: highlight ? '#cbd5e1' : '#374151', lineHeight: 1.45 }}>{f}</span>
            </li>
          ))}
        </ul>

        <button
          onClick={onCta}
          style={{
            padding: '0.8rem', borderRadius: '8px',
            fontFamily: 'Inter', fontWeight: 700, fontSize: '0.9rem',
            cursor: 'pointer', border: 'none', width: '100%',
            ...ctaStyle,
          }}
        >{cta}</button>
      </div>
    );
  }

  /* ── Landing page ───────────────────────────────────────────── */
  function App() {
    const [modal, setModal] = useState(null); // 'register' | 'login'

    const openRegister = () => setModal('register');
    const openLogin    = () => setModal('login');
    const closeModal   = () => setModal(null);

    return (
      <div style={{ minHeight: '100vh', background: '#FAFAF8' }}>

        {/* Nav */}
        <nav style={{ background: '#0F1E3C', borderBottom: '1px solid #1e3560' }}>
          <div style={{
            maxWidth: '1100px', margin: '0 auto',
            padding: '1rem 1.5rem',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              <span style={{ fontSize: '1.4rem' }} aria-hidden="true">📋</span>
              <span style={{ fontFamily: '"DM Serif Display", serif', fontSize: '1.4rem', color: '#FAFAF8' }}>FormIQ</span>
            </div>
            <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center' }}>
              <button onClick={openLogin} style={{
                background: 'none', border: '1px solid #2e4470',
                borderRadius: '7px', padding: '0.45rem 1rem',
                fontFamily: 'Inter', fontSize: '0.85rem', color: '#94a3b8',
                cursor: 'pointer',
              }}>Sign In</button>
              <button onClick={openRegister} style={{
                background: '#F59E0B', border: 'none',
                borderRadius: '7px', padding: '0.45rem 1rem',
                fontFamily: 'Inter', fontWeight: 600, fontSize: '0.85rem', color: '#0F1E3C',
                cursor: 'pointer',
              }}>Get Started Free</button>
            </div>
          </div>
        </nav>

        {/* Hero */}
        <section style={{ textAlign: 'center', padding: '5rem 1.5rem 4rem' }}>
          <div style={{
            display: 'inline-block', background: '#fef3c7', border: '1px solid #fde68a',
            borderRadius: '999px', padding: '0.3rem 1rem', marginBottom: '1.25rem',
          }}>
            <span style={{ fontFamily: 'Inter', fontSize: '0.78rem', fontWeight: 600, color: '#92400e' }}>
              Powered by Claude AI · Instant results
            </span>
          </div>

          <h1 style={{
            fontFamily: '"DM Serif Display", serif',
            fontSize: 'clamp(2rem, 5vw, 3.25rem)',
            color: '#0F1E3C', margin: '0 0 1rem', lineHeight: 1.15,
            maxWidth: '700px', marginLeft: 'auto', marginRight: 'auto',
          }}>
            Understand any official form.<br />Instantly.
          </h1>
          <p style={{
            fontFamily: 'Inter', fontSize: '1.05rem', color: '#64748b',
            lineHeight: 1.7, maxWidth: '540px', margin: '0 auto 2rem',
          }}>
            Type any form name — W-2, I-9, DS-160, FAFSA — and get a plain-English overview,
            field-by-field instructions, and a realistic filled sample in seconds.
          </p>
          <button onClick={openRegister} style={{
            background: '#0F1E3C', color: '#FAFAF8',
            border: 'none', borderRadius: '9px',
            padding: '0.9rem 2rem', fontFamily: 'Inter',
            fontWeight: 700, fontSize: '1rem', cursor: 'pointer',
            boxShadow: '0 4px 16px rgba(15,30,60,0.2)',
          }}>
            Start Free Trial — No credit card required
          </button>
          <p style={{ fontFamily: 'Inter', fontSize: '0.78rem', color: '#9ca3af', marginTop: '0.75rem' }}>
            10 lookups/day · 7-day trial · Upgrade anytime
          </p>
        </section>

        {/* Feature pills */}
        <section style={{ maxWidth: '800px', margin: '0 auto', padding: '0 1.5rem 4rem' }}>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
            gap: '1rem',
          }}>
            {[
              { icon: '📄', title: 'Plain-English Overview', desc: 'Who needs it, what it's for, where and when to file.' },
              { icon: '📝', title: 'Field-by-Field Guide', desc: 'Step-by-step instructions for every field, with ⚠️ warnings.' },
              { icon: '🗂️', title: 'Realistic Filled Sample', desc: 'See exactly how a completed form looks with dummy data.' },
            ].map(f => (
              <div key={f.title} style={{
                background: '#fff', border: '1.5px solid #e2e8f0', borderRadius: '12px',
                padding: '1.25rem', boxShadow: '0 2px 8px rgba(0,0,0,0.04)',
              }}>
                <div style={{ fontSize: '1.5rem', marginBottom: '0.5rem' }}>{f.icon}</div>
                <p style={{ fontFamily: 'Inter', fontWeight: 600, fontSize: '0.9rem', color: '#0F1E3C', margin: '0 0 0.3rem' }}>{f.title}</p>
                <p style={{ fontFamily: 'Inter', fontSize: '0.82rem', color: '#64748b', margin: 0, lineHeight: 1.55 }}>{f.desc}</p>
              </div>
            ))}
          </div>
        </section>

        {/* Pricing */}
        <section style={{ background: '#F1F5F9', padding: '4rem 1.5rem 5rem', borderTop: '1px solid #e2e8f0' }}>
          <div style={{ maxWidth: '1000px', margin: '0 auto' }}>
            <h2 style={{
              fontFamily: '"DM Serif Display", serif', fontSize: '2rem',
              color: '#0F1E3C', textAlign: 'center', margin: '0 0 0.5rem',
            }}>Simple, transparent pricing</h2>
            <p style={{
              fontFamily: 'Inter', fontSize: '0.9rem', color: '#64748b',
              textAlign: 'center', margin: '0 0 3rem',
            }}>Start free. Upgrade when you're ready.</p>

            <div style={{
              display: 'grid',
              gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))',
              gap: '1.5rem',
              alignItems: 'start',
            }}>
              {/* Free Trial */}
              <PricingCard
                title="Free Trial"
                price="$0"
                period="for 7 days"
                description="No credit card required. Just create an account and go."
                features={[
                  '10 lookups per day',
                  '7-day trial period',
                  'Overview, Instructions & Sample tabs',
                  'Last 5 searches history',
                  'Covers 1,000+ US government forms',
                ]}
                cta="Start Free Trial"
                ctaStyle={{ background: '#f1f5f9', color: '#0F1E3C', border: '1.5px solid #0F1E3C' }}
                onCta={openRegister}
              />

              {/* Pro — highlighted */}
              <PricingCard
                badge="MOST POPULAR"
                title="Pro"
                price="$29"
                period="/month"
                description="For individuals who need unlimited, ongoing form guidance."
                highlight
                features={[
                  'Unlimited lookups',
                  'All Free Trial features',
                  'PDF export (coming soon)',
                  'Unlimited search history',
                  'Priority support',
                  'New form types added monthly',
                ]}
                cta="Upgrade to Pro"
                ctaStyle={{ background: '#F59E0B', color: '#0F1E3C' }}
                onCta={openRegister}
              />

              {/* Team */}
              <PricingCard
                title="Team"
                price="$99"
                period="/month"
                description="For firms, agencies, and teams that need shared access."
                features={[
                  'Up to 10 team members',
                  'Everything in Pro',
                  'Team form history & sharing',
                  'REST API access',
                  'SSO / SAML (coming soon)',
                  'Dedicated onboarding & support',
                ]}
                cta="Contact Sales"
                ctaStyle={{ background: '#0F1E3C', color: '#FAFAF8' }}
                onCta={() => window.location.href = 'mailto:sales@formiq.app'}
              />
            </div>
          </div>
        </section>

        {/* Footer */}
        <footer style={{ padding: '2rem 1.5rem', textAlign: 'center', borderTop: '1px solid #e2e8f0' }}>
          <p style={{ fontFamily: 'Inter', fontSize: '0.73rem', color: '#9ca3af', margin: 0, lineHeight: 1.65 }}>
            FormIQ provides AI-generated guidance for informational purposes only. Always verify form instructions with the issuing agency. Not legal or tax advice.
          </p>
        </footer>

        {/* Modals */}
        {modal === 'register' && (
          <RegisterModal onClose={closeModal} onSwitch={() => setModal('login')} />
        )}
        {modal === 'login' && (
          <LoginModal onClose={closeModal} onSwitch={() => setModal('register')} />
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
